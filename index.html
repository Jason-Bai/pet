<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panda Pet</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2933;
        --leaf: #4f8a5b;
        --leaf-dark: #2f5f3b;
        --sky: #dff4ff;
        --blush: #ff9fba;
        --bamboo: #78b66d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 15%, #ffffff 0 0.4rem, transparent 0.45rem),
          radial-gradient(circle at 82% 24%, #ffffff 0 0.35rem, transparent 0.4rem),
          linear-gradient(180deg, var(--sky), #fff8e8 68%, #d8f0c8);
        font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
      }

      .scene {
        width: min(92vw, 680px);
        min-height: 620px;
        display: grid;
        place-items: center;
        position: relative;
      }

      .bamboo {
        position: absolute;
        bottom: 72px;
        width: 22px;
        height: 430px;
        border-radius: 999px;
        background:
          repeating-linear-gradient(
            180deg,
            var(--bamboo) 0 58px,
            var(--leaf-dark) 59px 64px
          );
        box-shadow: inset -5px 0 0 rgb(0 0 0 / 8%);
      }

      .bamboo.left {
        left: 44px;
        transform: rotate(-7deg);
      }

      .bamboo.right {
        right: 42px;
        transform: rotate(8deg);
      }

      .leaf {
        position: absolute;
        width: 92px;
        height: 34px;
        border-radius: 100% 0 100% 0;
        background: var(--leaf);
        transform-origin: 8px 28px;
      }

      .leaf.one {
        left: 54px;
        top: 120px;
        transform: rotate(-34deg);
      }

      .leaf.two {
        left: 68px;
        top: 174px;
        transform: rotate(18deg) scale(0.82);
      }

      .leaf.three {
        right: 52px;
        top: 126px;
        transform: rotate(208deg);
      }

      .leaf.four {
        right: 70px;
        top: 206px;
        transform: rotate(156deg) scale(0.82);
      }

      .panda {
        position: relative;
        width: min(78vw, 360px);
        aspect-ratio: 1 / 1.15;
        display: grid;
        place-items: center;
        animation: float 3.4s ease-in-out infinite;
      }

      .ear,
      .arm,
      .leg,
      .eye-patch {
        background: #20252b;
      }

      .ear {
        position: absolute;
        top: 34px;
        width: 92px;
        height: 92px;
        border-radius: 50%;
      }

      .ear.left {
        left: 45px;
      }

      .ear.right {
        right: 45px;
      }

      .head {
        position: absolute;
        top: 62px;
        width: 268px;
        height: 244px;
        border-radius: 49% 49% 46% 46%;
        background: #fffdf8;
        box-shadow: 0 16px 40px rgb(31 41 51 / 14%);
      }

      .body {
        position: absolute;
        top: 255px;
        width: 286px;
        height: 226px;
        border-radius: 48% 48% 42% 42%;
        background: #fffdf8;
        box-shadow: 0 18px 42px rgb(31 41 51 / 12%);
      }

      .belly {
        position: absolute;
        left: 58px;
        top: 48px;
        width: 170px;
        height: 136px;
        border-radius: 50%;
        background: #fff5e2;
      }

      .eye-patch {
        position: absolute;
        top: 88px;
        width: 78px;
        height: 90px;
        border-radius: 50%;
      }

      .eye-patch.left {
        left: 53px;
        transform: rotate(24deg);
      }

      .eye-patch.right {
        right: 53px;
        transform: rotate(-24deg);
      }

      .eye {
        position: absolute;
        top: 32px;
        left: 28px;
        width: 19px;
        height: 19px;
        border-radius: 50%;
        background: #fff;
        box-shadow: inset 0 -3px 0 rgb(0 0 0 / 18%);
      }

      .sparkle {
        position: absolute;
        top: 4px;
        left: 5px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fff;
      }

      .snout {
        position: absolute;
        left: 93px;
        top: 142px;
        width: 84px;
        height: 62px;
        border-radius: 50%;
        background: #fff2e3;
      }

      .nose {
        position: absolute;
        left: 30px;
        top: 15px;
        width: 25px;
        height: 18px;
        border-radius: 50%;
        background: #20252b;
      }

      .mouth {
        position: absolute;
        left: 30px;
        top: 35px;
        width: 24px;
        height: 14px;
        border-bottom: 4px solid #20252b;
        border-radius: 0 0 999px 999px;
      }

      .cheek {
        position: absolute;
        top: 164px;
        width: 34px;
        height: 20px;
        border-radius: 50%;
        background: var(--blush);
        opacity: 0.78;
      }

      .cheek.left {
        left: 42px;
      }

      .cheek.right {
        right: 42px;
      }

      .arm {
        position: absolute;
        top: 292px;
        width: 78px;
        height: 132px;
        border-radius: 999px;
      }

      .arm.left {
        left: 35px;
        transform: rotate(23deg);
      }

      .arm.right {
        right: 30px;
        transform: rotate(-29deg);
        animation: wave 1.7s ease-in-out infinite;
        transform-origin: 42px 24px;
      }

      .leg {
        position: absolute;
        bottom: 8px;
        width: 106px;
        height: 64px;
        border-radius: 50%;
      }

      .leg.left {
        left: 54px;
        transform: rotate(10deg);
      }

      .leg.right {
        right: 54px;
        transform: rotate(-10deg);
      }

      .caption {
        position: absolute;
        bottom: 6px;
        width: min(90vw, 520px);
        text-align: center;
        font-size: clamp(1.4rem, 4vw, 2.4rem);
        font-weight: 800;
        letter-spacing: 0;
        color: #26323f;
      }

      .caption span {
        display: block;
        margin-top: 8px;
        font-size: 1rem;
        font-weight: 600;
        color: #537064;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-14px);
        }
      }

      @keyframes wave {
        0%,
        100% {
          transform: rotate(-29deg);
        }
        50% {
          transform: rotate(-48deg) translateY(-8px);
        }
      }

      @media (max-width: 520px) {
        .scene {
          min-height: 560px;
        }

        .bamboo {
          opacity: 0.7;
        }

        .bamboo.left {
          left: 10px;
        }

        .bamboo.right {
          right: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="Cute panda pet">
      <div class="bamboo left"></div>
      <div class="bamboo right"></div>
      <div class="leaf one"></div>
      <div class="leaf two"></div>
      <div class="leaf three"></div>
      <div class="leaf four"></div>

      <section class="panda" aria-label="A smiling panda pet waving">
        <div class="ear left"></div>
        <div class="ear right"></div>
        <div class="body">
          <div class="belly"></div>
        </div>
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="leg left"></div>
        <div class="leg right"></div>
        <div class="head">
          <div class="eye-patch left">
            <div class="eye"><div class="sparkle"></div></div>
          </div>
          <div class="eye-patch right">
            <div class="eye"><div class="sparkle"></div></div>
          </div>
          <div class="cheek left"></div>
          <div class="cheek right"></div>
          <div class="snout">
            <div class="nose"></div>
            <div class="mouth"></div>
          </div>
        </div>
      </section>

      <h1 class="caption">
        Panda Pet
        <span>A tiny cute panda generated for Codex.</span>
      </h1>
    </main>
  </body>
</html>
